<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOTA ALLSTARS TEAM GENERATOR v1.5</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{

    background:
    radial-gradient(circle at top,#2c3444 0%,#141922 45%,#090c12 100%);

    color:white;

    min-height:100vh;

}

header{

    text-align:center;

    padding:35px;

}

header h1{

    color:#f2c14d;

    font-size:42px;

    letter-spacing:3px;

    text-shadow:

    0 0 10px #000,

    0 0 15px #7e5c17,

    0 0 25px #7e5c17;

}

header p{

    color:#9ea5b0;

    margin-top:10px;

}

.container{

    width:95%;

    max-width:1400px;

    margin:auto;

}

.players{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:15px;

}

.player{

    background:#1d2430;

    border:2px solid #7b652c;

    border-radius:12px;

    padding:15px;

    transition:.3s;

    box-shadow:

    0 0 15px rgba(0,0,0,.4);

}

.player:hover{

    transform:translateY(-4px);

    box-shadow:

    0 0 18px #6b9f47;

}

.player h3{

    margin-bottom:12px;

    color:#f2c14d;

}

.player input{

    width:100%;

    padding:10px;

    background:#10151f;

    color:white;

    border:1px solid #555;

    border-radius:6px;

    margin-bottom:12px;

}

.player select{

    width:100%;

    padding:10px;

    background:#10151f;

    color:white;

    border-radius:6px;

}

.center{

    text-align:center;

    margin:40px 0;

}

button{

    background:linear-gradient(#b8913b,#806020);

    color:white;

    border:none;

    padding:18px 45px;

    font-size:22px;

    border-radius:10px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    transform:scale(1.05);

    box-shadow:

    0 0 30px gold;

}

#loading{

    margin-top:25px;

    color:#90d86d;

    font-size:22px;

    display:none;

}

.teams{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:25px;

    margin-top:30px;

}

.team{

    background:#1a212d;

    border-radius:15px;

    padding:20px;

    min-height:420px;

    border:2px solid #6d5724;

}

.team h2{

    text-align:center;

    margin-bottom:20px;

    font-size:30px;

}

.sentinel h2{

    color:#63ff7f;

}

.scourge h2{

    color:#ff6666;

}

.card{

    background:#11161f;

    border-left:5px solid gold;

    padding:12px;

    margin-bottom:12px;

    border-radius:8px;

    animation:show .35s;

}

@keyframes show{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.power{

margin-top:20px;

font-size:22px;

text-align:center;

color:#ffd966;

}

@media(max-width:900px){

.teams{

grid-template-columns:1fr;

}

header h1{

font-size:30px;

}

}

</style>

</head>

<body>

<header>

<h1>⚔ DOTA ALLSTARS TEAM GENERATOR ⚔</h1>

<p>Balanced Draft v1.5</p>

</header>

<div class="container">

<div class="players" id="players">

</div>

<div class="center">

<button onclick="spin()">

🌀 КРУТИТЬ БАРАБАН

</button>

<div id="loading">

⚔ Drafting teams...

</div>

</div>

<div class="teams">

<div class="team sentinel">

<h2>

🟢 THE SENTINEL

</h2>

<div id="teamA"></div>

<div class="power" id="powerA"></div>

</div>

<div class="team scourge">

<h2>

🔴 THE SCOURGE

</h2>

<div id="teamB"></div>

<div class="power" id="powerB"></div>

</div>

</div>

</div>

<script>

const playersDiv=document.getElementById("players");

for(let i=1;i<=10;i++){

playersDiv.innerHTML+=`
<div class="player">

<h3>Игрок ${i}</h3>

<input
id="name${i}"
placeholder="Введите ник">

<select id="lvl${i}">

<option value="1">⭐ 1</option>
<option value="2">⭐⭐ 2</option>
<option value="3" selected>⭐⭐⭐ 3</option>
<option value="4">⭐⭐⭐⭐ 4</option>
<option value="5">⭐⭐⭐⭐⭐ 5</option>

</select>

</div>
`;

}
  // ===== Автосохранение =====

const STORAGE_KEY = "dota_team_generator_v15";

function savePlayers() {

    const data = [];

    for(let i=1;i<=10;i++){

        data.push({

            name:document.getElementById("name"+i).value,

            level:document.getElementById("lvl"+i).value

        });

    }

    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

}

function loadPlayers(){

    const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");

    data.forEach((p,index)=>{

        const id=index+1;

        if(document.getElementById("name"+id)){

            document.getElementById("name"+id).value=p.name||"";

            document.getElementById("lvl"+id).value=p.level||3;

        }

    });

}

setTimeout(loadPlayers,100);

document.addEventListener("input",savePlayers);

document.addEventListener("change",savePlayers);

// ===== Получить игроков =====

function getPlayers(){

    let arr=[];

    for(let i=1;i<=10;i++){

        let name=document.getElementById("name"+i).value.trim();

        let lvl=parseInt(document.getElementById("lvl"+i).value);

        if(name===""){

            alert("Заполните всех игроков.");

            return null;

        }

        arr.push({

            name,

            lvl

        });

    }

    return arr;

}

// ===== Перемешивание =====

function shuffle(array){

    let arr=[...array];

    for(let i=arr.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [arr[i],arr[j]]=[arr[j],arr[i]];

    }

    return arr;

}

// ===== Балансировка =====

function findBestTeams(players){

    let best=null;

    let bestDiff=9999;

    for(let i=0;i<6000;i++){

        let mix=shuffle(players);

        let A=mix.slice(0,5);

        let B=mix.slice(5);

        let powerA=A.reduce((a,b)=>a+b.lvl,0);

        let powerB=B.reduce((a,b)=>a+b.lvl,0);

        let diff=Math.abs(powerA-powerB);

        if(diff<bestDiff){

            bestDiff=diff;

            best={

                A,

                B,

                powerA,

                powerB

            };

        }

        if(bestDiff===0){

            break;

        }

    }

    return best;

}

// ===== Жеребьевка =====

function spin(){

    let players=getPlayers();

    if(!players) return;

    document.getElementById("loading").style.display="block";

    document.getElementById("teamA").innerHTML="";

    document.getElementById("teamB").innerHTML="";

    document.getElementById("powerA").innerHTML="";

    document.getElementById("powerB").innerHTML="";

    let frames=0;

    const loading=setInterval(()=>{

        const dots=".".repeat((frames%4));

        document.getElementById("loading").innerHTML="⚔ Drafting"+dots;

        frames++;

    },250);

    setTimeout(()=>{

        clearInterval(loading);

        document.getElementById("loading").style.display="none";

        let result=findBestTeams(players);

        showTeams(result);

    },2500);

}

// ===== Отрисовка =====

function showTeams(result){

    let htmlA="";

    let htmlB="";

    result.A.forEach(p=>{

        htmlA+=`

<div class="card">

<strong>⚔ ${p.name}</strong>

<br>

Уровень: ⭐ ${p.lvl}

</div>

`;

    });

    result.B.forEach(p=>{

        htmlB+=`

<div class="card">

<strong>☠ ${p.name}</strong>

<br>

Уровень: ⭐ ${p.lvl}

</div>

`;

    });

    document.getElementById("teamA").innerHTML=htmlA;

    document.getElementById("teamB").innerHTML=htmlB;

    document.getElementById("powerA").innerHTML="Общая сила: "+result.powerA;

    document.getElementById("powerB").innerHTML="Общая сила: "+result.powerB;

}
  // ===== Кнопка "Новая жеребьевка" =====
function newDraft(){

    document.getElementById("teamA").innerHTML="";
    document.getElementById("teamB").innerHTML="";
    document.getElementById("powerA").innerHTML="";
    document.getElementById("powerB").innerHTML="";
    document.getElementById("loading").style.display="none";

}

// ===== Очистить игроков =====
function clearPlayers(){

    if(!confirm("Очистить весь список игроков?")) return;

    for(let i=1;i<=10;i++){

        document.getElementById("name"+i).value="";
        document.getElementById("lvl"+i).value=3;

    }

    localStorage.removeItem(STORAGE_KEY);

    newDraft();

}

// ===== Анимация карточек =====

const style=document.createElement("style");

style.innerHTML=`

.card{

    animation:fadeIn .45s ease forwards;

    opacity:0;

}

.card:nth-child(1){animation-delay:.05s;}
.card:nth-child(2){animation-delay:.10s;}
.card:nth-child(3){animation-delay:.15s;}
.card:nth-child(4){animation-delay:.20s;}
.card:nth-child(5){animation-delay:.25s;}

@keyframes fadeIn{

0%{

opacity:0;
transform:translateX(-30px);

}

100%{

opacity:1;
transform:translateX(0);

}

}

.flash{

animation:flash .4s infinite;

}

@keyframes flash{

0%{

opacity:1;

}

50%{

opacity:.2;

}

100%{

opacity:1;

}

}

`;

document.head.appendChild(style);

// ===== Эффект барабана =====

function fakeRoulette(players){

    let loading=document.getElementById("loading");

    let index=0;

    loading.classList.add("flash");

    const timer=setInterval(()=>{

        loading.innerHTML="🎲 Выбираем: <b>"+players[index].name+"</b>";

        index++;

        if(index>=players.length){

            index=0;

        }

    },100);

    setTimeout(()=>{

        clearInterval(timer);

        loading.classList.remove("flash");

        loading.innerHTML="⚔ Команды готовы!";

    },1800);

}

// ===== Переопределяем spin() с рулеткой =====

const oldSpin=spin;

spin=function(){

    let players=getPlayers();

    if(!players) return;

    document.getElementById("loading").style.display="block";

    fakeRoulette(players);

    setTimeout(()=>{

        oldSpin();

    },1800);

};

console.log("Dota Team Generator v1.5 loaded");

</script>

</body>

</html>
